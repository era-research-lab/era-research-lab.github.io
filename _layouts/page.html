---
layout: default
---
<section class="page-head">
  <div class="container">
    {%- if page.eyebrow -%}<p class="page-head__eyebrow">{{ page.eyebrow }}</p>{%- endif -%}
    <h1 class="page-head__title">{{ page.title }}</h1>
    {%- if page.lead -%}<p class="page-head__lead">{{ page.lead }}</p>{%- endif -%}
  </div>
</section>

<div class="container page-body">
  {{ content }}
</div>
