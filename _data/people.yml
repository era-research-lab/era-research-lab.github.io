# ERA Lab — people
# Source of truth: Prof. Xiaomin Lin's lab roster (members.yaml).
#
# HOW TO ADD A PERSON:
#   - Add an entry under the appropriate group.
#   - `image`  is a filename inside assets/images/people/
#              Use "placeholder.png" if no photo is available (mark TODO).
#   - Optional per-person links: linkedin, scholar, github, website, email.
#   - `interests` is optional (kept empty for most — TODO: fill in).
# ===========================================================

director:
  name: Xiaomin Lin
  role: Director · Assistant Professor
  image: xiaomin_lin.jpg
  affiliation: >-
    Electrical Engineering · Affiliated, Bellini College of AI (Computer Science) ·
    Researcher, AI+X Institute — University of South Florida
  email: xlin2@usf.edu
  bio: >-
    Xiaomin Lin is a tenure-track Assistant Professor at the University of South
    Florida. He leads the ERA Lab, working at the intersection of robotics,
    multimodal perception, and AI for challenging environments — including
    underwater, agricultural, and healthcare domains. He received his PhD in
    Electrical and Computer Engineering from the University of Maryland, advised
    by Prof. Yiannis Aloimonos.
  interests:
    - Multimodal sensing for general robotics
    - Underwater perception & autonomy
    - Edge AI for robotics and healthcare
    - LLMs for robotics reasoning
  links:
    scholar: https://scholar.google.com/citations?user=nudP80UAAAAJ&hl=en
    linkedin: https://www.linkedin.com/in/xiaomin-lin/
    github: https://github.com/xiaominlin
    website: https://xiaominlin.github.io/

