- title: "PFS: Post-Fusion BEV Feature Stabilization for Robust Multimodal 3D Detection"
  slug: pfs
  image: pfs.png
  featured: true
  badge: IROS 2026
  description: >-
    A lightweight, near-identity module that stabilizes intermediate bird's-eye-view
    features of existing camera–LiDAR detectors, improving robustness under domain
    shift and sensor degradation without retraining the detection head.
  tags: [3D Detection, Multimodal Fusion, BEV, Robustness, Autonomous Driving]
  people: [Trung Tien Dong, Xiaomin Lin]
  page: /projects/pfs/
  links:
    - { label: Project, url: /projects/pfs/, icon: "fas fa-file-lines" }
    - { label: Paper,   url: "https://arxiv.org/abs/2603.05623", icon: "ai ai-arxiv" }
    - { label: Video,   url: "https://youtu.be/-4BJK7Oi_yM", icon: "fab fa-youtube" }

